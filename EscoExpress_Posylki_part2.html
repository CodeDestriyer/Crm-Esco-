<script>
// ================================================================
// EscoExpress Posylki CRM — JavaScript Logic
// ================================================================

// ── CONFIG ──
const GAS_URL = ''; // ВСТАВТЕ URL ВАШОГО GAS WEB APP ТУТ
const UPLOAD_URL = 'https://botisystem.com/uploads/upload.php';

// ── STATE ──
let allData = [];
let filteredData = [];
let currentDirection = 'ue'; // 'ue' | 'eu'
let currentFilter = 'all';
let currentPayFilter = 'all';
let searchQuery = '';
let openCardId = null;
let activeDetailTab = {};
let messengerPhone = '';
let routeTargetPkgId = '';
let photoTargetPkgId = '';
let hasNpApiKey = false;
let dupCheckTimer = null;
let stats = { total: 0, ue: 0, eu: 0, byStatus: {}, byPay: {}, totalDebt: 0 };

// ── API ──
async function apiPost(action, data) {
    const payload = Object.assign({ action: action }, data || {});
    try {
        const resp = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        return await resp.json();
    } catch (e) {
        console.error('API error:', e);
        return { ok: false, error: e.message };
    }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async function() {
    showLoader('Завантаження посилок...');
    try {
        const [allRes, statsRes, npRes] = await Promise.all([
            apiPost('getAll', { sheet: 'all', filter: {} }),
            apiPost('getStats', {}),
            apiPost('checkNpApiKey', {})
        ]);
        if (allRes.ok) allData = allRes.data || [];
        if (statsRes.ok) stats = statsRes;
        if (npRes.ok) hasNpApiKey = npRes.hasKey || false;
        updateSidebar();
        applyFilters();
    } catch (e) {
        showToast('Помилка завантаження: ' + e.message);
    }
    hideLoader();
});

// ── FILTERS ──
function setDirection(dir) {
    currentDirection = dir;
    document.getElementById('tabUE').className = dir === 'ue' ? 'dir-tab active-ue' : 'dir-tab';
    document.getElementById('tabEU').className = dir === 'eu' ? 'dir-tab active-eu' : 'dir-tab';
    updateFormForDirection();
    applyFilters();
}

function setFilter(status) {
    currentFilter = status;
    currentPayFilter = 'all';
    document.getElementById('filterPayStatus').value = 'all';
    updateSidebarActive();
    applyFilters();
}

function setPayFilter(status) {
    currentPayFilter = status;
    currentFilter = 'all';
    updateSidebarActive();
    applyFilters();
}

function updateSidebarActive() {
    document.querySelectorAll('.pc-sidebar-item').forEach(el => el.classList.remove('active'));
    if (currentFilter === 'all' && currentPayFilter === 'all') document.getElementById('sideAll')?.classList.add('active');
    else if (currentFilter === 'Новий') document.getElementById('sideNew')?.classList.add('active');
    else if (currentFilter === 'В роботі') document.getElementById('sideWork')?.classList.add('active');
    else if (currentFilter === 'Підтверджено') document.getElementById('sideConfirmed')?.classList.add('active');
    else if (currentFilter === 'Відмова') document.getElementById('sideRefused')?.classList.add('active');
    else if (currentPayFilter === 'Не оплачено') document.getElementById('sideUnpaid')?.classList.add('active');
    else if (currentPayFilter === 'Частково') document.getElementById('sidePartial')?.classList.add('active');
    else if (currentPayFilter === 'Оплачено') document.getElementById('sidePaid')?.classList.add('active');
}

function onSearchInput() {
    searchQuery = document.getElementById('searchInput').value.trim();
    applyFilters();
}

function applyFilters() {
    const sheetName = currentDirection === 'ue' ? 'Реєстрація ТТН УК-єв' : 'Виклик Курєра ЄВ-ук';
    const statusFilter = document.getElementById('filterStatus').value;
    const payFilter = document.getElementById('filterPayStatus').value;

    filteredData = allData.filter(p => {
        if (p._sheet !== sheetName) return false;
        if (String(p['Статус CRM']) === 'Архів') return false;

        if (currentFilter !== 'all' && p['Статус ліда'] !== currentFilter) return false;
        if (currentPayFilter !== 'all' && p['Статус оплати'] !== currentPayFilter) return false;
        if (statusFilter !== 'all' && p['Статус посилки'] !== statusFilter) return false;
        if (payFilter !== 'all' && p['Статус оплати'] !== payFilter) return false;

        if (searchQuery) {
            const s = searchQuery.toLowerCase();
            const fields = [p['Піб відправника'], p['Піб отримувача'], p['Телефон реєстратора'], p['Телефон отримувача'], p['PKG_ID'], p['Номер ТТН']];
            if (!fields.some(f => String(f || '').toLowerCase().includes(s))) return false;
        }
        return true;
    });

    renderCards();
}

// ── SIDEBAR COUNTS ──
function updateSidebar() {
    const ueData = allData.filter(p => p._sheet === 'Реєстрація ТТН УК-єв' && p['Статус CRM'] !== 'Архів');
    const euData = allData.filter(p => p._sheet === 'Виклик Курєра ЄВ-ук' && p['Статус CRM'] !== 'Архів');
    const curData = currentDirection === 'ue' ? ueData : euData;

    document.getElementById('countUE').textContent = ueData.length;
    document.getElementById('countEU').textContent = euData.length;

    const counts = { all: curData.length, 'Новий': 0, 'В роботі': 0, 'Підтверджено': 0, 'Відмова': 0 };
    const payCounts = { 'Не оплачено': 0, 'Частково': 0, 'Оплачено': 0 };

    curData.forEach(p => {
        const st = p['Статус ліда'] || 'Новий';
        if (counts[st] !== undefined) counts[st]++;
        const pay = p['Статус оплати'] || 'Не оплачено';
        if (payCounts[pay] !== undefined) payCounts[pay]++;
    });

    document.getElementById('pcCountAll').textContent = counts.all;
    document.getElementById('pcCountNew').textContent = counts['Новий'];
    document.getElementById('pcCountWork').textContent = counts['В роботі'];
    document.getElementById('pcCountConfirmed').textContent = counts['Підтверджено'];
    document.getElementById('pcCountRefused').textContent = counts['Відмова'];
    document.getElementById('pcCountUnpaid').textContent = payCounts['Не оплачено'];
    document.getElementById('pcCountPartial').textContent = payCounts['Частково'];
    document.getElementById('pcCountPaid').textContent = payCounts['Оплачено'];

    // Mobile counts
    document.getElementById('mobCountAll').textContent = counts.all;
    document.getElementById('mobCountNew').textContent = counts['Новий'];
    document.getElementById('mobCountWork').textContent = counts['В роботі'];
    document.getElementById('mobCountConfirmed').textContent = counts['Підтверджено'];
    document.getElementById('mobCountRefused').textContent = counts['Відмова'];
}

// ── RENDER CARDS ──
function renderCards() {
    const container = document.getElementById('cardsList');
    const empty = document.getElementById('emptyState');
    const isUE = currentDirection === 'ue';

    if (filteredData.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    container.innerHTML = filteredData.map(p => {
        const pkgId = p['PKG_ID'] || '';
        const sender = p['Піб відправника'] || '';
        const phone = p['Телефон реєстратора'] || '';
        const receiver = p['Піб отримувача'] || '';
        const phoneRec = p['Телефон отримувача'] || '';
        const addressFrom = p['Адреса відправки'] || '';
        const addressTo = isUE ? (p['Адреса в Європі'] || '') : (p['Місто Нова Пошта'] || '');
        const weight = p['Кг'] || '';
        const sum = parseFloat(p['Сума']) || 0;
        const deposit = parseFloat(p['Завдаток']) || 0;
        const debt = Math.max(0, sum - deposit);
        const currency = p['Валюта оплати'] || 'UAH';
        const status = p['Статус ліда'] || 'Новий';
        const pkgStatus = p['Статус посилки'] || '';
        const rteId = p['RTE_ID'] || '';
        const ttn = isUE ? (p['Номер ТТН'] || '') : '';
        const date = p['Дата створення'] || '';
        const tag = p['Тег'] || '';

        const statusClass = status === 'Новий' ? 'status-new' : status === 'В роботі' ? 'status-work' : status === 'Підтверджено' ? 'status-confirmed' : status === 'Відмова' ? 'status-refused' : '';
        const dirBadge = isUE ? 'dir-badge-ua-eu' : 'dir-badge-eu-ua';
        const dirText = isUE ? 'УК&#8594;ЄВ' : 'ЄВ&#8594;УК';
        const isOpen = openCardId === pkgId;

        let routeStrip = '';
        if (rteId) {
            routeStrip = '<div class="card-route-strip has-route"><span class="card-route-icon2">&#9989;</span><span class="card-route-text">В маршруті: ' + rteId + '</span></div>';
        }

        return '<div class="lead-card ' + statusClass + '" id="card-' + pkgId + '">' +
            '<div class="card-header"><div class="card-header-top">' +
            '<div class="card-checkbox-wrap"><input type="checkbox" class="card-checkbox" value="' + pkgId + '"></div>' +
            '<div class="card-body" onclick="toggleCard(\'' + pkgId + '\')">' +
            '<div class="card-top-row">' +
            '<span class="card-direction ' + dirBadge + '">' + dirText + '</span>' +
            '<span class="card-phone">' + escHtml(phone) + '</span>' +
            (weight ? '<span class="card-weight">' + weight + ' кг</span>' : '') +
            '<div class="card-price-wrap">' +
            '<span class="card-price">' + sum + ' ' + currency + '</span>' +
            (deposit > 0 ? '<span class="card-deposit has-deposit">завд: ' + deposit + '</span>' : '') +
            (debt > 0 ? '<span class="card-deposit" style="color:#ef4444;font-weight:700;">борг: ' + debt + '</span>' : '') +
            '</div></div>' +
            '<div class="card-row2-wrap">' +
            '<div class="card-info-row"><span class="card-id">' + pkgId + '</span><span class="card-name">&#128100; ' + escHtml(sender) + ' &#8594; ' + escHtml(receiver) + '</span></div>' +
            '<div class="card-route"><span class="card-route-icon">&#128205;</span> ' + escHtml(addressFrom) + ' &#8594; ' + escHtml(addressTo) + '</div>' +
            '<div class="card-meta-row">' +
            (date ? '<span class="card-meta-tag">&#128197; ' + date + '</span>' : '') +
            (pkgStatus ? '<span class="card-meta-tag">' + escHtml(pkgStatus) + '</span>' : '') +
            (ttn ? '<span class="card-meta-tag">TTH: ' + escHtml(ttn) + '</span>' : '') +
            (tag ? '<span class="card-meta-tag" style="background:#f3e8ff;color:#7c3aed;">' + escHtml(tag) + '</span>' : '') +
            '</div></div></div>' +
            '<div class="card-right-section"><button class="card-actions-toggle ' + (isOpen ? 'open' : '') + '" onclick="toggleCard(\'' + pkgId + '\')">&#9660;</button></div>' +
            '</div></div>' +
            routeStrip +
            '<div class="card-details ' + (isOpen ? 'show' : '') + '" id="details-' + pkgId + '">' +
            (isOpen ? renderDetailsContent(p) : '') +
            '</div>' +
            '<div class="card-actions ' + (isOpen ? 'show' : '') + '" id="actions-' + pkgId + '">' +
            '<button class="btn-card-action btn-call" onclick="callPhone(\'' + escAttr(phone) + '\')">&#128222; Дзвінок</button>' +
            '<button class="btn-card-action btn-write" onclick="openMessengerPopup(\'' + escAttr(phone) + '\')">&#128172; Писати</button>' +
            (isUE && ttn ? '<button class="btn-card-action btn-track" onclick="trackTTN(\'' + escAttr(pkgId) + '\', \'' + escAttr(ttn) + '\')">&#128230; Трекінг</button>' : '') +
            '<button class="btn-card-action btn-route" onclick="openRouteModal(\'' + escAttr(pkgId) + '\')">&#128666; Маршрут</button>' +
            '<button class="btn-card-action btn-delete" onclick="deleteParcel(\'' + escAttr(pkgId) + '\')">&#128465;</button>' +
            '</div></div>';
    }).join('');

    updateSidebar();
}

// ── TOGGLE CARD ──
function toggleCard(pkgId) {
    const wasOpen = openCardId === pkgId;
    openCardId = wasOpen ? null : pkgId;
    // Re-render to update details
    renderCards();
    if (!wasOpen) {
        const el = document.getElementById('card-' + pkgId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// ── RENDER DETAILS CONTENT ──
function renderDetailsContent(p) {
    const isUE = p._sheet === 'Реєстрація ТТН УК-єв';
    const pkgId = p['PKG_ID'];
    const activeTab = activeDetailTab[pkgId] || 'basic';

    const tabs = [
        { id: 'basic', label: '&#128196; Основне' },
        { id: 'parcel', label: '&#128230; Посилка' },
        ...(isUE ? [{ id: 'np', label: '&#128176; НП' }] : []),
        { id: 'finance', label: '&#128176; Фінанси' },
        { id: 'route', label: '&#128666; Рейс' },
        { id: 'payments', label: '&#128179; Платежі' },
        { id: 'system', label: '&#9881; Системні' }
    ];

    let tabsHtml = '<div class="detail-accordion-tabs">' +
        tabs.map(t => '<span class="detail-tab ' + (activeTab === t.id ? 'active' : '') + '" onclick="switchDetailTab(\'' + pkgId + '\', \'' + t.id + '\')">' + t.label + '</span>').join('') +
        '</div>';

    let panelHtml = '';

    if (activeTab === 'basic') {
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            detailBlock(pkgId, 'Піб відправника', p['Піб відправника']) +
            detailBlock(pkgId, 'Телефон реєстратора', p['Телефон реєстратора']) +
            detailBlock(pkgId, 'Адреса відправки', p['Адреса відправки']) +
            detailBlock(pkgId, 'Піб отримувача', p['Піб отримувача']) +
            detailBlock(pkgId, 'Телефон отримувача', p['Телефон отримувача']) +
            detailBlock(pkgId, isUE ? 'Адреса в Європі' : 'Місто Нова Пошта', isUE ? p['Адреса в Європі'] : p['Місто Нова Пошта']) +
            detailBlock(pkgId, 'Статус ліда', p['Статус ліда'], ['Новий', 'В роботі', 'Підтверджено', 'Відмова']) +
            detailBlock(pkgId, 'Тег', p['Тег']) +
            '</div></div>';
    } else if (activeTab === 'parcel') {
        const photoUrl = p['Фото посилки'] || '';
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            detailBlock(pkgId, 'Опис', p['Опис']) +
            detailBlock(pkgId, 'Деталі', p['Деталі']) +
            detailBlock(pkgId, 'Кількість позицій', p['Кількість позицій']) +
            detailBlock(pkgId, 'Кг', p['Кг']) +
            detailBlock(pkgId, 'Оціночна вартість', p['Оціночна вартість']) +
            (isUE ? detailBlock(pkgId, 'Номер ТТН', p['Номер ТТН']) : '') +
            detailBlock(pkgId, 'Внутрішній №', p['Внутрішній №']) +
            detailBlock(pkgId, 'Статус посилки', p['Статус посилки'], ['Прийнято', 'В дорозі', 'На складі', 'Доставлено', 'Видано']) +
            '</div>' +
            // Photo section
            '<div class="detail-section-title">Фото</div>' +
            '<div class="photo-grid">' +
            (photoUrl ? '<img class="photo-thumb" src="' + escAttr(photoUrl) + '" onclick="viewPhoto(\'' + escAttr(photoUrl) + '\')">' : '') +
            '<div class="photo-upload-btn" onclick="startPhotoUpload(\'' + escAttr(pkgId) + '\')">+</div>' +
            '</div>' +
            // TTN Tracking
            (isUE && p['Номер ТТН'] ? '<div style="margin-top:12px;"><button class="bs-btn primary" style="padding:8px 16px;font-size:11px;" onclick="trackTTN(\'' + escAttr(pkgId) + '\', \'' + escAttr(p['Номер ТТН']) + '\')">&#128230; Відстежити ТТН</button>' +
            (hasNpApiKey ? ' <button class="bs-btn cancel" style="padding:8px 16px;font-size:11px;" onclick="autoTrackTTN(\'' + escAttr(pkgId) + '\', \'' + escAttr(p['Номер ТТН']) + '\')">&#128260; Оновити статус</button>' : '') +
            '</div>' : '') +
            // Rating
            '<div class="detail-section-title">Рейтинг</div>' +
            renderRating(pkgId, p['Рейтинг'], p['Коментар рейтингу']) +
            '</div>';
    } else if (activeTab === 'np' && isUE) {
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            detailBlock(pkgId, 'Сума НП', p['Сума НП']) +
            detailBlock(pkgId, 'Валюта НП', p['Валюта НП'], ['UAH', 'EUR', 'CHF', 'USD']) +
            detailBlock(pkgId, 'Форма НП', p['Форма НП'], ['Готівка', 'Безготівкова', 'Картка']) +
            detailBlock(pkgId, 'Статус НП', p['Статус НП'], ['Очікує', 'Отримано', 'Відправлено']) +
            '</div></div>';
    } else if (activeTab === 'finance') {
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            detailBlock(pkgId, 'Сума', p['Сума']) +
            detailBlock(pkgId, 'Валюта оплати', p['Валюта оплати'], ['UAH', 'EUR', 'CHF', 'USD', 'PLN', 'CZK']) +
            detailBlock(pkgId, 'Завдаток', p['Завдаток']) +
            detailBlock(pkgId, 'Валюта завдатку', p['Валюта завдатку'], ['UAH', 'EUR', 'CHF', 'USD', 'PLN', 'CZK']) +
            detailBlock(pkgId, 'Форма оплати', p['Форма оплати'], ['Готівка', 'Безготівкова', 'Картка']) +
            detailBlock(pkgId, 'Статус оплати', p['Статус оплати'], ['Не оплачено', 'Частково', 'Оплачено']) +
            '<div class="detail-block" style="border-left-color:var(--danger)"><div class="detail-block-label">БОРГ</div><div class="detail-block-value" style="color:var(--danger);font-size:16px;font-weight:800;">' + (p['Борг'] || 0) + '</div></div>' +
            detailBlock(pkgId, 'Примітка оплати', p['Примітка оплати']) +
            '</div></div>';
    } else if (activeTab === 'route') {
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            detailBlock(pkgId, 'Дата відправки', p['Дата відправки']) +
            detailBlock(pkgId, 'Таймінг', p['Таймінг']) +
            detailBlock(pkgId, 'Номер авто', p['Номер авто']) +
            '<div class="detail-block"><div class="detail-block-label">RTE_ID</div><div class="detail-block-value">' + escHtml(p['RTE_ID'] || '—') + '</div></div>' +
            detailBlock(pkgId, 'Дата отримання', p['Дата отримання']) +
            '</div>' +
            (p['RTE_ID'] ? '<div style="margin-top:10px;"><button class="bs-btn cancel" style="padding:8px 16px;font-size:11px;color:var(--danger);" onclick="removeFromRoute(\'' + escAttr(pkgId) + '\')">&#10060; Відв\'язати від маршруту</button></div>' : '<div style="margin-top:10px;"><button class="bs-btn primary" style="padding:8px 16px;font-size:11px;" onclick="openRouteModal(\'' + escAttr(pkgId) + '\')">&#128666; В маршрут</button></div>') +
            // Order info
            (p['ORDER_ID'] ? '<div class="detail-section-title">Замовлення клієнта</div><div style="padding:8px 12px;background:#eff6ff;border-radius:8px;font-size:12px;">&#128241; Замовлення: <strong>' + escHtml(p['ORDER_ID']) + '</strong></div>' : '') +
            '</div>';
    } else if (activeTab === 'payments') {
        panelHtml = '<div class="detail-tab-panel active"><div class="payments-loading" id="pay-' + pkgId + '"><span class="pay-spinner"></span> Завантаження платежів...</div></div>';
        loadPayments(pkgId);
    } else if (activeTab === 'system') {
        panelHtml = '<div class="detail-tab-panel active"><div class="details-grid">' +
            '<div class="detail-block"><div class="detail-block-label">PKG_ID</div><div class="detail-block-value">' + escHtml(pkgId) + '</div></div>' +
            '<div class="detail-block"><div class="detail-block-label">Ід смарт</div><div class="detail-block-value">' + escHtml(p['Ід_смарт'] || '—') + '</div></div>' +
            '<div class="detail-block"><div class="detail-block-label">Дата створення</div><div class="detail-block-value">' + escHtml(p['Дата створення'] || '—') + '</div></div>' +
            '<div class="detail-block"><div class="detail-block-label">SOURCE_SHEET</div><div class="detail-block-value">' + escHtml(p['SOURCE_SHEET'] || '—') + '</div></div>' +
            '<div class="detail-block"><div class="detail-block-label">CLI_ID</div><div class="detail-block-value">' + escHtml(p['CLI_ID'] || '—') + '</div></div>' +
            '<div class="detail-block"><div class="detail-block-label">ORDER_ID</div><div class="detail-block-value">' + escHtml(p['ORDER_ID'] || '—') + '</div></div>' +
            detailBlock(pkgId, 'Статус CRM', p['Статус CRM'], ['Активний', 'Архів']) +
            detailBlock(pkgId, 'Примітка', p['Примітка']) +
            detailBlock(pkgId, 'Примітка СМС', p['Примітка СМС']) +
            '</div></div>';
    }

    return tabsHtml + panelHtml;
}

// ── DETAIL BLOCK ──
function detailBlock(pkgId, label, value, options) {
    const val = value !== undefined && value !== null && value !== '' ? String(value) : '';
    const isEmpty = !val;
    const escapedVal = escHtml(val || '—');
    const id = 'db-' + pkgId + '-' + label.replace(/\s/g, '_');

    let editBtn = '<div class="detail-block-actions"><button class="detail-micro-btn" onclick="startInlineEdit(\'' + escAttr(pkgId) + '\', \'' + escAttr(label) + '\', this)" title="Редагувати">&#9998;</button></div>';

    return '<div class="detail-block" id="' + id + '">' +
        '<div class="detail-block-label">' + escHtml(label) + '</div>' +
        '<div class="detail-block-value ' + (isEmpty ? 'empty' : '') + '">' + escapedVal + '</div>' +
        editBtn + '</div>';
}

function switchDetailTab(pkgId, tabId) {
    activeDetailTab[pkgId] = tabId;
    const p = allData.find(x => x['PKG_ID'] === pkgId);
    if (p) {
        const detailEl = document.getElementById('details-' + pkgId);
        if (detailEl) detailEl.innerHTML = renderDetailsContent(p);
    }
}

// ── INLINE EDIT ──
function startInlineEdit(pkgId, col, btn) {
    const block = btn.closest('.detail-block');
    const valueEl = block.querySelector('.detail-block-value');
    const p = allData.find(x => x['PKG_ID'] === pkgId);
    if (!p) return;

    const currentVal = p[col] !== undefined ? String(p[col]) : '';

    // Check if there are predefined options for selects
    const selectOptions = getFieldOptions(col);

    if (selectOptions) {
        valueEl.innerHTML = '<select class="detail-inline-edit" onchange="saveInlineEdit(\'' + escAttr(pkgId) + '\', \'' + escAttr(col) + '\', this.value)" onblur="cancelInlineEdit(\'' + escAttr(pkgId) + '\')">' +
            selectOptions.map(o => '<option value="' + escAttr(o) + '" ' + (o === currentVal ? 'selected' : '') + '>' + escHtml(o) + '</option>').join('') +
            '</select>';
        block.querySelector('select')?.focus();
    } else {
        valueEl.innerHTML = '<input class="detail-inline-edit" value="' + escAttr(currentVal) + '" onkeydown="if(event.key===\'Enter\')saveInlineEdit(\'' + escAttr(pkgId) + '\', \'' + escAttr(col) + '\', this.value);if(event.key===\'Escape\')cancelInlineEdit(\'' + escAttr(pkgId) + '\');" onblur="saveInlineEdit(\'' + escAttr(pkgId) + '\', \'' + escAttr(col) + '\', this.value)">';
        block.querySelector('input')?.focus();
    }
}

function getFieldOptions(col) {
    const opts = {
        'Статус ліда': ['Новий', 'В роботі', 'Підтверджено', 'Відмова'],
        'Статус оплати': ['Не оплачено', 'Частково', 'Оплачено'],
        'Статус посилки': ['Прийнято', 'В дорозі', 'На складі', 'Доставлено', 'Видано'],
        'Статус CRM': ['Активний', 'Архів'],
        'Валюта оплати': ['UAH', 'EUR', 'CHF', 'USD', 'PLN', 'CZK'],
        'Валюта завдатку': ['UAH', 'EUR', 'CHF', 'USD', 'PLN', 'CZK'],
        'Валюта НП': ['UAH', 'EUR', 'CHF', 'USD'],
        'Форма НП': ['Готівка', 'Безготівкова', 'Картка'],
        'Статус НП': ['Очікує', 'Отримано', 'Відправлено'],
        'Форма оплати': ['Готівка', 'Безготівкова', 'Картка']
    };
    return opts[col] || null;
}

async function saveInlineEdit(pkgId, col, newValue) {
    const p = allData.find(x => x['PKG_ID'] === pkgId);
    if (!p) return;
    const oldValue = p[col] !== undefined ? String(p[col]) : '';
    if (newValue === oldValue) { cancelInlineEdit(pkgId); return; }

    showLoader('Збереження...');
    const res = await apiPost('updateField', { pkg_id: pkgId, col: col, value: newValue });
    hideLoader();

    if (res.ok) {
        p[col] = newValue;
        // Recalc debt
        if (col === 'Сума' || col === 'Завдаток') {
            p['Борг'] = Math.max(0, (parseFloat(p['Сума']) || 0) - (parseFloat(p['Завдаток']) || 0));
            const dep = parseFloat(p['Завдаток']) || 0;
            if (dep > 0 && p['Борг'] > 0) p['Статус оплати'] = 'Частково';
            else if (dep > 0 && p['Борг'] === 0) p['Статус оплати'] = 'Оплачено';
            else p['Статус оплати'] = 'Не оплачено';
        }
        showToast('Збережено');
        renderCards();
    } else {
        showToast('Помилка: ' + (res.error || 'невідома'));
        cancelInlineEdit(pkgId);
    }
}

function cancelInlineEdit(pkgId) {
    renderCards();
}

// ── PAYMENTS ──
async function loadPayments(pkgId) {
    const res = await apiPost('getPayments', { pkg_id: pkgId });
    const container = document.getElementById('pay-' + pkgId);
    if (!container) return;

    if (!res.ok || !res.data || res.data.length === 0) {
        container.innerHTML = '<div class="payments-empty">Платежів ще немає</div>';
        return;
    }

    let totalPaid = 0;
    let html = '<table class="payments-table"><thead><tr><th>Дата</th><th>Тип</th><th>Сума</th><th>Валюта</th><th>Статус</th></tr></thead><tbody>';
    res.data.forEach(pay => {
        const sum = parseFloat(pay['Сума']) || 0;
        totalPaid += sum;
        html += '<tr><td>' + escHtml(pay['Дата створення'] || '') + '</td><td>' + escHtml(pay['Тип платежу'] || '') + '</td><td style="font-weight:700;">' + sum + '</td><td>' + escHtml(pay['Валюта'] || '') + '</td><td>' + escHtml(pay['Статус платежу'] || '') + '</td></tr>';
    });
    html += '</tbody></table>';

    const p = allData.find(x => x['PKG_ID'] === pkgId);
    const debt = p ? (p['Борг'] || 0) : 0;
    html += '<div class="payments-summary"><div class="pay-sum-item"><span class="pay-sum-label">Всього сплачено:</span><span class="pay-sum-value">' + totalPaid + '</span></div><div class="pay-sum-item"><span class="pay-sum-label">Борг:</span><span class="pay-sum-debt">' + debt + '</span></div></div>';

    container.innerHTML = html;
}

// ── RATING ──
function renderRating(pkgId, rating, comment) {
    const r = parseInt(rating) || 0;
    const c = comment || '';
    let stars = '<div class="rating-stars">';
    for (let i = 1; i <= 5; i++) {
        stars += '<span class="rating-star ' + (i <= r ? 'active' : '') + '" onclick="setRating(\'' + escAttr(pkgId) + '\', ' + i + ')">&#9733;</span>';
    }
    stars += '</div>';
    if (c) stars += '<div style="margin-top:4px;font-size:11px;color:var(--text-secondary);">' + escHtml(c) + '</div>';
    stars += '<div style="margin-top:6px;"><input class="bs-input" style="padding:6px 8px;font-size:11px;" placeholder="Коментар рейтингу" value="' + escAttr(c) + '" onblur="saveRatingComment(\'' + escAttr(pkgId) + '\', this.value)"></div>';
    return stars;
}

async function setRating(pkgId, value) {
    const res = await apiPost('updateField', { pkg_id: pkgId, col: 'Рейтинг', value: value });
    if (res.ok) {
        const p = allData.find(x => x['PKG_ID'] === pkgId);
        if (p) p['Рейтинг'] = value;
        renderCards();
        showToast('Рейтинг збережено');
    }
}

async function saveRatingComment(pkgId, value) {
    const p = allData.find(x => x['PKG_ID'] === pkgId);
    if (p && p['Коментар рейтингу'] === value) return;
    const res = await apiPost('updateField', { pkg_id: pkgId, col: 'Коментар рейтингу', value: value });
    if (res.ok && p) p['Коментар рейтингу'] = value;
}

// ── ADD PARCEL FORM ──
function openAddForm() {
    document.getElementById('addFormOverlay').classList.add('show');
    updateFormForDirection();
    clearForm();
}

function closeAddForm() {
    document.getElementById('addFormOverlay').classList.remove('show');
    clearForm();
}

function updateFormForDirection() {
    const isUE = currentDirection === 'ue';
    document.getElementById('fAddressToWrap').style.display = isUE ? 'block' : 'none';
    document.getElementById('fCityNPWrap').style.display = isUE ? 'none' : 'block';
    document.getElementById('fTTNWrap').style.display = isUE ? 'block' : 'none';
    document.getElementById('addFormTitle').innerHTML = isUE ? '&#128230; Нова посилка УК&#8594;ЄВ' : '&#128230; Нова посилка ЄВ&#8594;УК';
}

function clearForm() {
    ['fSender', 'fPhone', 'fAddressFrom', 'fReceiver', 'fPhoneReceiver', 'fAddressTo', 'fCityNP', 'fTTN', 'fDescription', 'fWeight', 'fQty', 'fEstValue', 'fSum', 'fNote'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    document.getElementById('fCurrency').value = 'UAH';
    document.getElementById('duplicateWarning').classList.remove('show');
}

async function saveParcel() {
    const isUE = currentDirection === 'ue';
    const sender = document.getElementById('fSender').value.trim();
    const phone = document.getElementById('fPhone').value.trim();
    const addressFrom = document.getElementById('fAddressFrom').value.trim();
    const receiver = document.getElementById('fReceiver').value.trim();
    const phoneReceiver = document.getElementById('fPhoneReceiver').value.trim();

    // Validate required
    if (!sender || !phone || !addressFrom || !receiver || !phoneReceiver) {
        showToast('Заповніть всі обов\'язкові поля');
        return;
    }
    if (isUE && !document.getElementById('fAddressTo').value.trim()) {
        showToast('Вкажіть адресу в Європі');
        return;
    }
    if (!isUE && !document.getElementById('fCityNP').value.trim()) {
        showToast('Вкажіть місто Нова Пошта');
        return;
    }

    const data = {
        sender: sender,
        phone: phone,
        addressFrom: addressFrom,
        receiver: receiver,
        phoneReceiver: phoneReceiver,
        addressTo: isUE ? document.getElementById('fAddressTo').value.trim() : '',
        cityNP: !isUE ? document.getElementById('fCityNP').value.trim() : '',
        ttn: isUE ? document.getElementById('fTTN').value.trim() : '',
        description: document.getElementById('fDescription').value.trim(),
        weight: document.getElementById('fWeight').value.trim(),
        qty: document.getElementById('fQty').value.trim(),
        estimatedValue: document.getElementById('fEstValue').value.trim(),
        sum: document.getElementById('fSum').value.trim(),
        currency: document.getElementById('fCurrency').value,
        note: document.getElementById('fNote').value.trim()
    };

    showLoader('Збереження посилки...');
    closeAddForm();

    const res = await apiPost('addParcel', { sheet: currentDirection, data: data });
    hideLoader();

    if (res.ok) {
        showToast('Посилку додано: ' + res.pkg_id);
        await reloadData();
    } else {
        showToast('Помилка: ' + (res.error || 'невідома'));
    }
}

// ── DUPLICATE CHECK ──
function checkDuplicatesDebounced() {
    clearTimeout(dupCheckTimer);
    dupCheckTimer = setTimeout(checkDuplicates, 500);
}

async function checkDuplicates() {
    const pib = document.getElementById('fSender').value.trim();
    const phone = document.getElementById('fPhone').value.trim();
    if (!pib || !phone) return;

    const res = await apiPost('checkDuplicates', { pib: pib, phone: phone });
    const warning = document.getElementById('duplicateWarning');
    if (res.soft || res.exact) {
        document.getElementById('duplicateText').textContent = 'Знайдено збіг: ' + (res.match?.pib || '') + ' (' + (res.match?.phone || '') + ') — ' + (res.match?.pkg_id || '');
        warning.classList.add('show');
    } else {
        warning.classList.remove('show');
    }
}

// ── DELETE ──
async function deleteParcel(pkgId) {
    if (!confirm('Видалити посилку ' + pkgId + '?')) return;
    showLoader('Видалення...');
    const res = await apiPost('deleteParcel', { pkg_id: pkgId });
    hideLoader();
    if (res.ok) {
        showToast('Посилку видалено');
        allData = allData.filter(p => p['PKG_ID'] !== pkgId);
        openCardId = null;
        applyFilters();
    } else {
        showToast('Помилка: ' + (res.error || 'невідома'));
    }
}

// ── TRACKING ──
function trackTTN(pkgId, ttn) {
    window.open('https://novaposhta.ua/tracking/?cargo=' + encodeURIComponent(ttn), '_blank');
}

async function autoTrackTTN(pkgId, ttn) {
    showLoader('Оновлення статусу ТТН...');
    const res = await apiPost('trackParcel', { pkg_id: pkgId, ttn: ttn });
    hideLoader();
    if (res.ok) {
        showToast('Статус: ' + (res.status || 'Невідомий'));
        const p = allData.find(x => x['PKG_ID'] === pkgId);
        if (p && res.status) p['Статус посилки'] = res.status;
        renderCards();
    } else {
        showToast('Помилка: ' + (res.error || 'невідома'));
    }
}

// ── PHOTOS ──
function startPhotoUpload(pkgId) {
    photoTargetPkgId = pkgId;
    document.getElementById('photoFileInput').click();
}

async function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('Файл занадто великий (макс 5MB)'); return; }

    showLoader('Завантаження фото...');
    const formData = new FormData();
    formData.append('file', file);
    formData.append('PKG_ID', photoTargetPkgId);

    try {
        const resp = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
        const result = await resp.json();
        if (result.ok && result.url) {
            // Save to GAS
            await apiPost('addPhoto', { pkg_id: photoTargetPkgId, url: result.url, type: 'Загальне' });
            const p = allData.find(x => x['PKG_ID'] === photoTargetPkgId);
            if (p) p['Фото посилки'] = result.url;
            showToast('Фото завантажено');
            renderCards();
        } else {
            showToast('Помилка завантаження: ' + (result.error || ''));
        }
    } catch (e) {
        showToast('Помилка: ' + e.message);
    }
    hideLoader();
    event.target.value = '';
}

function viewPhoto(url) {
    document.getElementById('photoViewerImg').src = url;
    document.getElementById('photoViewer').classList.add('show');
}

function closePhotoViewer() {
    document.getElementById('photoViewer').classList.remove('show');
}

// ── ROUTE ──
async function openRouteModal(pkgId) {
    routeTargetPkgId = pkgId;
    document.getElementById('routeModalOverlay').classList.add('show');
    document.getElementById('routeModalContent').innerHTML = 'Завантаження маршрутів...';

    const res = await apiPost('getRoutesList', {});
    if (res.ok && res.data) {
        if (res.data.length === 0) {
            document.getElementById('routeModalContent').innerHTML = '<div class="payments-empty">Немає доступних маршрутів</div>';
            return;
        }
        document.getElementById('routeModalContent').innerHTML = res.data.map(r =>
            '<div class="route-item" onclick="selectRoute(\'' + escAttr(r.sheetName) + '\')">' +
            '<div class="route-item-name">' + escHtml(r.sheetName) + '</div>' +
            '<div class="route-item-count">' + r.rowCount + ' записів</div>' +
            '</div>'
        ).join('');
    } else {
        document.getElementById('routeModalContent').innerHTML = '<div class="payments-empty">Помилка: ' + (res.error || '') + '</div>';
    }
}

function closeRouteModal() {
    document.getElementById('routeModalOverlay').classList.remove('show');
}

async function selectRoute(sheetName) {
    closeRouteModal();
    showLoader('Додаємо в маршрут...');
    const res = await apiPost('addToRoute', { pkg_id: routeTargetPkgId, sheet_name: sheetName, rte_id: sheetName });
    hideLoader();
    if (res.ok) {
        showToast('Посилку додано в ' + sheetName);
        const p = allData.find(x => x['PKG_ID'] === routeTargetPkgId);
        if (p) p['RTE_ID'] = sheetName;
        renderCards();
    } else {
        showToast('Помилка: ' + (res.error || ''));
    }
}

async function removeFromRoute(pkgId) {
    if (!confirm('Відв\'язати посилку від маршруту?')) return;
    showLoader('Відв\'язуємо...');
    const res = await apiPost('removeFromRoute', { pkg_id: pkgId });
    hideLoader();
    if (res.ok) {
        showToast('Посилку відв\'язано від маршруту');
        const p = allData.find(x => x['PKG_ID'] === pkgId);
        if (p) { p['RTE_ID'] = ''; p['Номер авто'] = ''; p['Дата відправки'] = ''; }
        renderCards();
    } else {
        showToast('Помилка: ' + (res.error || ''));
    }
}

// ── MESSENGER ──
function openMessengerPopup(phone) {
    messengerPhone = phone;
    document.getElementById('messengerOverlay').classList.add('show');
}

function closeMessenger() {
    document.getElementById('messengerOverlay').classList.remove('show');
}

function openMessenger(type) {
    const phone = messengerPhone.replace(/[^+\d]/g, '');
    closeMessenger();
    if (type === 'viber') window.open('viber://chat?number=' + encodeURIComponent(phone));
    else if (type === 'telegram') window.open('https://t.me/' + phone);
    else if (type === 'whatsapp') window.open('https://wa.me/' + phone.replace('+', ''));
    else if (type === 'sms') window.open('sms:' + phone);
}

function callPhone(phone) {
    window.open('tel:' + phone);
}

// ── RELOAD DATA ──
async function reloadData() {
    showLoader('Оновлення...');
    const [allRes, statsRes] = await Promise.all([
        apiPost('getAll', { sheet: 'all', filter: {} }),
        apiPost('getStats', {})
    ]);
    if (allRes.ok) allData = allRes.data || [];
    if (statsRes.ok) stats = statsRes;
    updateSidebar();
    applyFilters();
    hideLoader();
}

// ── UI HELPERS ──
function openSideMenu() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('sideMenuOverlay').classList.add('show'); }
function closeSideMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('sideMenuOverlay').classList.remove('show'); }

function togglePcSection(section) {
    const content = document.getElementById('pcSection' + section.charAt(0).toUpperCase() + section.slice(1));
    const header = content?.previousElementSibling;
    if (content) content.classList.toggle('collapsed');
    if (header) header.classList.toggle('collapsed');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoader(text) {
    document.getElementById('loaderText').textContent = text || 'Завантаження...';
    document.getElementById('loader').classList.add('show');
}

function hideLoader() {
    document.getElementById('loader').classList.remove('show');
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
}

function escAttr(s) {
    return String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
